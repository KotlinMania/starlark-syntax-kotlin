name: Build (iOS)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (iOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test iOS targets
        # Full XCFramework assembly also touches tvOS/watchOS frameworks,
        # which depend on variants not published by current dependencies.
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosSimulatorArm64
          compileKotlinIosX64
          iosSimulatorArm64Test
          --no-configuration-cache

      # Native upload-artifact (GitHub-published) makes the test reports
      # downloadable from the run summary page. `if: success() || failure()`
      # ensures uploads even when tests fail. Combined with the per-test
      # testLogging events in build.gradle.kts, the audit trail covers both
      # raw-log streaming and post-run inspection.
      - name: Upload test reports (iOS)
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-ios
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
          if-no-files-found: warn
