# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '23 18 * * 6'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Runner size impacts CodeQL analysis time. To learn more, please see:
    #   - https://gh.io/recommended-hardware-resources-for-running-codeql
    #   - https://gh.io/supported-runners-and-hardware-resources
    #   - https://gh.io/using-larger-runners (GitHub.com only)
    # Consider using larger runners or machines with greater resources for possible analysis time improvements.
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        # `java-kotlin` runs in `manual` mode because:
        #   - `autobuild` invokes `./gradlew testClasses`, a JVM-style task that
        #     doesn't exist in this Kotlin Multiplatform project (no JVM target).
        #   - `build-mode: none` produces no extractable artifacts for KMP, so
        #     the extractor exits with "could not process any code written in
        #     Java/Kotlin".
        #   - `compileKotlinMetadata` (the previous attempt) only emits `.knm`
        #     metadata via the metadata compiler — the LD_PRELOAD tracer hooks
        #     JVM `kotlinc` exec, so metadata builds give it nothing to trace.
        # The manual build below runs `compileAndroidMain`, which is the one
        # KMP compilation in this repo that produces real JVM `.class` files
        # (`com.android.kotlin.multiplatform.library` plugin). That's the
        # compile path CodeQL's Kotlin extractor can ingest.
        #
        # `javascript-typescript` and `python` are intentionally not scanned:
        #   - javascript-typescript: the only JS file is karma.config.d/serve-golden-files.js;
        #     the extractor reports "could not process any code written in
        #     JavaScript/TypeScript" and fails the run.
        #   - python: no Python source in this repo.
        - language: actions
          build-mode: none
        - language: java-kotlin
          build-mode: manual
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      if: matrix.build-mode == 'manual'
      uses: actions/setup-java@v5.2.0
      with:
        distribution: zulu
        java-version: '21'

    - name: Setup Gradle
      if: matrix.build-mode == 'manual'
      uses: gradle/actions/setup-gradle@v6.1.0

    - name: Stop any existing Gradle daemons before CodeQL tracing
      if: matrix.build-mode == 'manual'
      run: ./gradlew --stop || true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Compile Android Kotlin (JVM bytecode) for CodeQL extraction
      if: matrix.build-mode == 'manual'
      shell: bash
      # `compileAndroidMain` is the only compilation in this KMP project that
      # emits real JVM `.class` files (under `build/classes/kotlin/android/main`).
      # The `com.android.kotlin.multiplatform.library` plugin runs the JVM
      # `kotlinc` for the Android target, which is exactly what the CodeQL
      # Kotlin extractor can hook via Build Tools API.
      #
      # `--rerun-tasks` defeats Gradle's up-to-date check and `--no-build-cache`
      # disables cache hits restored by setup-gradle, ensuring kotlinc is
      # actually invoked.
      #
      # We use in-process compilation mode to ensure the Build Tools API is used,
      # which CodeQL's modern Java/Kotlin extractor can trace. The older LD_PRELOAD
      # approach required out-of-process compilation, but BTA support is more reliable.
      run: |
        ./gradlew compileAndroidMain \
          --rerun-tasks \
          --no-build-cache \
          --no-configuration-cache \
          -Pkotlin.compiler.execution.strategy=in-process

    - name: Check CodeQL tracer log
      if: matrix.build-mode == 'manual' && always()
      run: |
        echo "=== CodeQL Tracer Log ==="
        if [ -f "/home/runner/work/_temp/codeql_databases/log/build-tracer.log" ]; then
          cat "/home/runner/work/_temp/codeql_databases/log/build-tracer.log" || true
        else
          echo "Tracer log not found"
        fi
        echo "=== Checking for class files ==="
        find build/classes/kotlin/android/main -name "*.class" 2>/dev/null | head -20 || echo "No class files found"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
